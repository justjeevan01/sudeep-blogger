    <meta charset="UTF-8">

    <title>Profile - Presidency Blogs</title>

<body>
    <nav class="navbar navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">📚 Presidency Blogs</span>
            <div class="d-flex gap-2 flex-wrap">

    <div class="container py-5">

            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="mb-3">Your Profile</h2>
                        <p class="text-muted mb-4">You are currently signed in to Presidency Blogs.</p>
                        <div class="mb-4">
                            <p class="mb-1"><strong>Name:</strong> <span id="profileName">-</span></p>

    <script>
        const profileName = localStorage.getItem('userName') || 'Student';
        const profileEmail = localStorage.getItem('userEmail') || 'Not available';
        document.getElementById('profileName').textContent = profileName;
        document.getElementById('profileEmail').textContent = profileEmail;
    </script>
